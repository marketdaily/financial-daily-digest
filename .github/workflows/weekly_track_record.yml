name: 戰績紀錄刷新

# 兩個排程點:
#  1) 美股每個交易日收盤 +2 小時:UTC 週一~週五 22:07 = TW 週二~週六 06:07
#     美股 NY 16:00 ET 收盤 ≈ UTC 20:00,加 2 小時讓 Yahoo 數據結算穩定
#  2) 每週日 15:00 UTC = TW 週日 23:00:全量回掃 + 週末總整理
# 跑完更新 docs/data/track-record.json,commit 回 main 並用 wrangler 部署 Pages
on:
  schedule:
    - cron: "7 22 * * 1-5"   # 美股交易日收盤 +2 小時
    - cron: "0 15 * * 0"     # 每週日 23:00 TWT 全量回掃
  workflow_dispatch:          # 手動觸發備援

permissions:
  contents: write             # 用來 push commit 回 main

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install beautifulsoup4

      - name: Build track-record.json
        env:
          # 若有設此 secret,builder 會列舉 Worker KV 裡的個人化日報並
          # 把訊號卡算進總勝率(隱私策略 A:stats 全算,records 只留公版)
          MARKETDAILY_INTERNAL_TOKEN: ${{ secrets.MARKETDAILY_INTERNAL_TOKEN }}
        run: python3 scripts/build_track_record.py

      - name: Show diff summary
        run: |
          echo "=== git status ==="
          git status --short
          echo "=== json stats ==="
          python3 -c "import json; d=json.load(open('docs/data/track-record.json')); print(json.dumps(d['stats'], indent=2, ensure_ascii=False))"

      - name: Commit JSON if changed
        id: commit_step
        run: |
          if [[ -z "$(git status --short docs/data/track-record.json)" ]]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No changes to track-record.json, skipping commit."
            exit 0
          fi
          git config user.name "marketdaily-bot"
          git config user.email "marketdailyhq@gmail.com"
          git add docs/data/track-record.json
          git commit -m "chore(track-record): auto-refresh $(date -u +%Y-%m-%d_%H%M)UTC"
          git push origin HEAD:main
          echo "no_changes=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node (for wrangler)
        if: steps.commit_step.outputs.no_changes != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy to Cloudflare Pages
        if: steps.commit_step.outputs.no_changes != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: a92082d84f08b1d4883facbf1a1dc445
        run: |
          npx wrangler@latest pages deploy docs \
            --project-name marketdaily \
            --commit-dirty=true \
            --commit-message "track-record auto-refresh"
